name: Bug report
description: Report a defect — a wrong finding, a missed flow, a crash, or unexpected exit behavior.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. **Please do not include real secrets or credentials** in this issue.
        For a security vulnerability, use private reporting instead — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did preflight do, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest code snippet and command that reproduces the issue. Redact any real secrets.
      render: shell
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact preflight command you ran.
      placeholder: preflight check --staged
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `preflight --version`, or the commit SHA you built from.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.x"
    validations:
      required: true
